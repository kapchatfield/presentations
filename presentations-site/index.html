<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kap Chatfield · Presentations</title>
  <meta name="description" content="Presentation archive for Kap Chatfield." />
  <style>
    :root {
      --bg: #000000;
      --panel: #0b0b0d;
      --panel-hover: #121214;
      --border: #1c1c20;
      --border-hover: #8D82FE;
      --lavender: #8D82FE;
      --text: #ffffff;
      --muted: #8a8a92;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 72px 28px 100px; }
    header { margin-bottom: 56px; border-bottom: 1px solid var(--border); padding-bottom: 36px; }
    .wordmark {
      font-weight: 700; font-size: 15px; letter-spacing: -0.01em; color: var(--text);
      margin-bottom: 30px; display: inline-block;
    }
    .wordmark .dot { color: var(--lavender); }
    h1 {
      font-weight: 700; font-size: clamp(40px, 6.5vw, 64px); line-height: 1.02;
      letter-spacing: -0.03em;
    }
    h1 .accent { color: var(--lavender); }
    .sub { color: var(--muted); margin-top: 18px; font-size: 17px; max-width: 520px; font-weight: 300; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
    .card {
      display: block; background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 26px 26px 24px; text-decoration: none; color: inherit;
      transition: transform 0.16s ease, background 0.16s ease, border-color 0.16s ease;
    }
    .card:hover { transform: translateY(-2px); background: var(--panel-hover); border-color: var(--border-hover); }
    .card .tag {
      display: inline-block; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--lavender); border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 10px; margin-bottom: 16px; font-weight: 700;
    }
    .card h2 { font-weight: 700; font-size: 22px; line-height: 1.18; letter-spacing: -0.02em; margin-bottom: 10px; }
    .card p { color: var(--muted); font-size: 15px; font-weight: 300; }
    .card .date { color: var(--muted); font-size: 12px; margin-top: 18px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .empty, .error { color: var(--muted); padding: 40px 0; font-size: 17px; }
    .error { color: #e89b9b; }
    footer { margin-top: 72px; color: var(--muted); font-size: 13px; letter-spacing: 0.02em; }
    footer a { color: var(--lavender); text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <span class="wordmark"><span class="dot">•</span>kapchatfield</span>
      <h1>Presentations<span class="accent">.</span></h1>
      <p class="sub">Every deck, in one place. Built to be found, shared, and kept.</p>
    </header>

    <main id="gallery" class="grid">
      <div class="empty">Loading presentations…</div>
    </main>

    <footer>
      presentations.kapchatfield.com
    </footer>
  </div>

  <script>
    async function load() {
      const gallery = document.getElementById('gallery');
      try {
        const res = await fetch('presentations.json?v=' + Date.now());
        if (!res.ok) throw new Error('manifest not found');
        const items = await res.json();
        if (!Array.isArray(items) || items.length === 0) {
          gallery.innerHTML = '<div class="empty">No presentations yet. Add one to presentations.json.</div>';
          return;
        }
        items.sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
        gallery.innerHTML = items.map(function (it) {
          var tag = it.tag ? '<span class="tag">' + esc(it.tag) + '</span>' : '';
          var date = it.date ? '<div class="date">' + esc(formatDate(it.date)) + '</div>' : '';
          var desc = it.description ? '<p>' + esc(it.description) + '</p>' : '';
          return '<a class="card" href="' + esc(it.slug) + '/">' +
                   tag +
                   '<h2>' + esc(it.title || it.slug) + '</h2>' +
                   desc + date +
                 '</a>';
        }).join('');
      } catch (e) {
        gallery.innerHTML = '<div class="error">Could not load presentations.json. Make sure the file exists at the site root.</div>';
      }
    }
    function esc(s) {
      return String(s).replace(/[&<>"']/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
      });
    }
    function formatDate(d) {
      var parts = String(d).split('-');
      if (parts.length !== 3) return d;
      var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
      var m = months[parseInt(parts[1], 10) - 1] || '';
      return m + ' ' + parseInt(parts[2], 10) + ', ' + parts[0];
    }
    load();
  </script>
</body>
</html>
